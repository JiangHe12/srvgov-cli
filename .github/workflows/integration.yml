name: Integration

# Real-backend integration tests (//go:build integration), run against a live,
# digest-pinned OpenSSH server started on the runner. Kept separate from
# push/PR CI, but reused as a release gate. Also runs nightly and on demand.

on:
  workflow_call: {}
  schedule:
    - cron: '0 4 * * *'   # daily 04:00 UTC
  workflow_dispatch: {}

env:
  # Digest observed in the successful v0.10.0 exact-tag integration run.
  OPENSSH_IMAGE: docker.io/linuxserver/openssh-server@sha256:9c5e178975fcc3917853f5e37cbf135ad7deb11de504ab0f460cc81a2e1eb539

permissions:
  contents: read

jobs:
  integration:
    name: real-OpenSSH integration (transport + file)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Start OpenSSH server
        shell: bash
        run: |
          set -euo pipefail
          ssh-keygen -t ed25519 -N '' -f "$HOME/it_key" -q
          pulled=0
          for i in 1 2 3; do
            if docker pull "$OPENSSH_IMAGE"; then
              pulled=1
              break
            fi
            echo "image pull attempt $i failed"
            sleep 5
          done
          [ "$pulled" = 1 ] || { echo "failed to pull pinned OpenSSH image"; exit 1; }
          docker run -d --name srvgov-it-sshd -p 2222:2222 \
            -e PUID=1000 -e PGID=1000 -e USER_NAME=svcgovit \
            -e PUBLIC_KEY="$(cat "$HOME/it_key.pub")" -e PASSWORD_ACCESS=false \
            "$OPENSSH_IMAGE"

      - name: Wait for sshd
        shell: bash
        run: |
          # GitHub's bash runs with `set -e`; a not-yet-ready probe must not
          # abort before the retry loop can poll, so disable errexit here.
          set +e
          ok=0
          for i in $(seq 1 40); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                   -o ConnectTimeout=3 -i "$HOME/it_key" -p 2222 \
                   svcgovit@127.0.0.1 true 2>/dev/null; then
              ok=1; echo "sshd ready after $((i * 2))s"; break
            fi
            sleep 2
          done
          [ "$ok" = 1 ] || { echo "sshd not ready"; docker logs --tail 40 srvgov-it-sshd; exit 1; }

      - name: Run integration test
        shell: bash
        env:
          SRVGOV_IT_REQUIRED: '1'
          SRVGOV_IT_SSH_ADDR: 127.0.0.1:2222
          SRVGOV_IT_SSH_USER: svcgovit
        run: |
          export SRVGOV_IT_SSH_KEY="$HOME/it_key"
          go test -race -tags=integration -count=1 -v -run '^TestIntegration' ./internal/sshexec/ ./cmd/

      - name: Show OpenSSH logs on failure
        if: failure()
        shell: bash
        run: docker logs --tail 100 srvgov-it-sshd || true

      - name: Tear down OpenSSH server
        if: always()
        shell: bash
        run: docker rm -f srvgov-it-sshd || true
