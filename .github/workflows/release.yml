name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-preflight:
    name: release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Verify release metadata and signed annotated tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          SEMVER_RE='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.((0|[1-9][0-9]*)|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "${tag}" =~ ${SEMVER_RE} ]]; then
            echo "::error::Release tag must be a semantic version (received ${tag})"
            exit 1
          fi
          version=$(jq -er '.version | select(type == "string" and length > 0)' package.json)
          if [[ "${tag}" != "v${version}" ]]; then
            echo "::error::Tag ${tag} does not match package.json version ${version}"
            exit 1
          fi
          heading_count=$(grep -Fxc "## ${tag}" CHANGELOG.md || true)
          if [[ "${heading_count}" -ne 1 ]]; then
            echo "::error::CHANGELOG.md must contain exactly one heading: ## ${tag}"
            exit 1
          fi

          api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          ref_json=$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}/git/ref/tags/${tag}")
          object_type=$(jq -r '.object.type' <<<"${ref_json}")
          object_sha=$(jq -r '.object.sha' <<<"${ref_json}")
          if [[ "${object_type}" != "tag" || ! "${object_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release tag ${tag} must be an annotated tag"
            exit 1
          fi

          tag_json=$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}/git/tags/${object_sha}")
          verified=$(jq -r '.verification.verified // false' <<<"${tag_json}")
          reason=$(jq -r '.verification.reason // "missing"' <<<"${tag_json}")
          if [[ "${verified}" != "true" ]]; then
            echo "::error::GitHub did not verify the signature on ${tag} (reason: ${reason})"
            exit 1
          fi
          if [[ $(jq -r '.tag' <<<"${tag_json}") != "${tag}" || $(jq -r '.object.type' <<<"${tag_json}") != "commit" ]]; then
            echo "::error::Annotated tag object does not describe ${tag} targeting a commit"
            exit 1
          fi

          remote_target=$(jq -r '.object.sha' <<<"${tag_json}")
          if [[ ! "${remote_target}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Annotated tag target is not a full commit SHA"
            exit 1
          fi
          local_target=$(git rev-parse "${tag}^{commit}")
          if [[ "${remote_target}" != "${local_target}" ]]; then
            echo "::error::GitHub tag target does not match the checked-out commit"
            exit 1
          fi

          git fetch --no-tags --force origin \
            refs/heads/main:refs/remotes/origin/main
          main_target=$(git rev-parse 'refs/remotes/origin/main^{commit}')
          if [[ ! "${main_target}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::origin/main did not resolve to a full commit SHA"
            exit 1
          fi
          if [[ "${remote_target}" != "${main_target}" ]]; then
            echo "::error::Release tag ${tag} must target origin/main exactly"
            exit 1
          fi

  ci:
    name: CI and vulnerability gates on release commit
    needs: release-preflight
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  real-openssh-integration:
    name: real OpenSSH integration
    needs: release-preflight
    permissions:
      contents: read
    uses: ./.github/workflows/integration.yml

  release:
    needs: [release-preflight, ci, real-openssh-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          BUILT=$(date -u +%Y-%m-%d)

          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          OUTPUT="srvgov-cli-${GOOS}-${GOARCH}${EXT}"

          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.built=${BUILT}" -o "${OUTPUT}" .

          sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.0'

      - name: Sign binary
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          BINARY="srvgov-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          cosign sign-blob --yes --output-signature "${BINARY}.sig" --output-certificate "${BINARY}.crt" "${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: srvgov-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: srvgov-cli-*

  checksums:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: srvgov-cli-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          binaries=(
            srvgov-cli-darwin-amd64
            srvgov-cli-darwin-arm64
            srvgov-cli-linux-amd64
            srvgov-cli-linux-arm64
            srvgov-cli-windows-amd64.exe
            srvgov-cli-windows-arm64.exe
          )
          expected_files=()
          for binary in "${binaries[@]}"; do
            expected_files+=("$binary" "$binary.sha256" "$binary.sig" "$binary.crt")
          done
          mapfile -t expected_files < <(printf '%s\n' "${expected_files[@]}" | LC_ALL=C sort)
          mapfile -t actual_files < <(
            find . -mindepth 1 -printf '%P\n' | LC_ALL=C sort
          )
          if ! diff -u \
            <(printf '%s\n' "${expected_files[@]}") \
            <(printf '%s\n' "${actual_files[@]}"); then
            printf 'release artifact set must contain exactly six platform bundles\n' >&2
            exit 1
          fi
          for binary in "${binaries[@]}"; do
            sha256sum "$binary" | cmp - "$binary.sha256"
          done
          sha256sum "${binaries[@]}" > checksums.txt
          test "$(wc -l < checksums.txt)" -eq 6

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.0'

      - name: Sign checksums
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cd artifacts
          cosign sign-blob --yes --output-signature checksums.txt.sig --output-certificate checksums.txt.crt checksums.txt

      - name: Verify release asset count
        run: test "$(find artifacts -maxdepth 1 -type f | wc -l)" -eq 27

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-assets
          path: artifacts/*

  publish:
    needs: [release, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BODY=$(awk -v heading="## ${VERSION}" '$0 == heading {found=1; next} found && /^## / {exit} found {print}' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          echo "$BODY" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release_notes.md
          files: artifacts/*

  npm-publish:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public
