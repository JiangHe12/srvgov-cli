name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Run test suite
        run: go test ./... -count=1

  release:
    needs: integration-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          BUILT=$(date -u +%Y-%m-%d)

          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          OUTPUT="srvgov-cli-${GOOS}-${GOARCH}${EXT}"

          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.built=${BUILT}" -o "${OUTPUT}" .

          sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.0'

      - name: Sign binary
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          BINARY="srvgov-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          cosign sign-blob --yes --output-signature "${BINARY}.sig" --output-certificate "${BINARY}.crt" "${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: srvgov-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: srvgov-cli-*

  checksums:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            mv "$dir"* . 2>/dev/null || true
            rmdir "$dir" 2>/dev/null || true
          done
          sha256sum srvgov-cli-* | grep -v '\.sha256$' | grep -v '\.sig$' | grep -v '\.crt$' > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.0'

      - name: Sign checksums
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cd artifacts
          cosign sign-blob --yes --output-signature checksums.txt.sig --output-certificate checksums.txt.crt checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: |
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
            artifacts/checksums.txt.crt

  publish:
    needs: [release, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BODY=$(awk "/^## ${VERSION}$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          echo "$BODY" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release_notes.md
          files: artifacts/**/*

  npm-publish:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public
